name: OSM Restaurant Crawler

# Runs every Sunday at 02:00 UTC (free GitHub Actions minutes: 2000/month)
# Also dispatchable manually for initial seed runs
on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      city:
        description: 'City name to crawl (leave empty for all pending tiles)'
        required: false
        default: ''
      max_tiles:
        description: 'Max tiles to process in this run (default: 50)'
        required: false
        default: '50'

jobs:
  crawl:
    name: Crawl pending OSM tiles
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Stay under 60-min free tier limit

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MAX_TILES: ${{ github.event.inputs.max_tiles || '50' }}
      CITY_FILTER: ${{ github.event.inputs.city || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply DB migration - ensure osm_restaurant_cache exists
        run: |
          # Install Supabase CLI
          curl -fsSL https://supabase.com/install.sh | sh 2>/dev/null || true
          # Extract project ref from SUPABASE_URL (e.g. https://abcdef.supabase.co -> abcdef)
          PROJECT_REF=$(echo "${SUPABASE_URL}" | sed 's|https://||' | sed 's|.supabase.co.*||')
          echo "Project ref: ${PROJECT_REF}"
          # Apply the migration via Supabase Management API
          SQL="CREATE TABLE IF NOT EXISTS public.osm_restaurant_cache (osm_id bigint PRIMARY KEY, name text NOT NULL DEFAULT 'Unnamed', cuisine text, city text NOT NULL DEFAULT '', country text, lat double precision NOT NULL, lng double precision NOT NULL, address text, phone text, website text, opening_hours text, fetched_at timestamptz NOT NULL DEFAULT now()); CREATE INDEX IF NOT EXISTS idx_osm_cache_country ON public.osm_restaurant_cache (country); CREATE INDEX IF NOT EXISTS idx_osm_cache_lat_lng ON public.osm_restaurant_cache (lat, lng); ALTER TABLE public.osm_restaurant_cache ENABLE ROW LEVEL SECURITY; DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='osm_restaurant_cache' AND policyname='Service role full access') THEN CREATE POLICY \"Service role full access\" ON public.osm_restaurant_cache FOR ALL TO service_role USING (true) WITH CHECK (true); END IF; END \$\$; DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='osm_restaurant_cache' AND policyname='Public read osm cache') THEN CREATE POLICY \"Public read osm cache\" ON public.osm_restaurant_cache FOR SELECT TO anon, authenticated USING (true); END IF; END \$\$;"
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"${SQL//\"/\\'}\"}" \
            | head -c 500 || echo "Migration API call done (check if SUPABASE_ACCESS_TOKEN secret is set)"
        continue-on-error: true

      - name: Run OSM tile crawler
        run: bun run scripts/crawlTiles.ts

      - name: Upload crawl report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawl-report-${{ github.run_number }}
          path: crawl-report.json
          if-no-files-found: ignore
