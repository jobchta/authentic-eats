name: Import Real OSM Restaurant Data (ZERO-COST)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  import-osm-restaurants:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase pycountry

      - name: Import OSM restaurant data
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests
          import os
          import time
          from supabase import create_client
          import pycountry

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          sb = create_client(url, key)

          FLAG_EMOJI = {
            'US': 'đź‡şđź‡¸', 'JP': 'đź‡Żđź‡µ', 'FR': 'đź‡«đź‡·', 'GB': 'đź‡¬đź‡§', 'IT': 'đź‡®đź‡ą',
            'IN': 'đź‡®đź‡ł', 'SG': 'đź‡¸đź‡¬', 'AU': 'đź‡¦đź‡ş', 'MX': 'đź‡˛đź‡˝', 'TH': 'đź‡ąđź‡­',
          }

          CONTINENT_MAP = {
            'US': 'North America', 'JP': 'Asia', 'FR': 'Europe', 'GB': 'Europe', 'IT': 'Europe',
            'IN': 'Asia', 'SG': 'Asia', 'AU': 'Oceania', 'MX': 'North America', 'TH': 'Asia',
          }

          CITIES = [
            ('Tokyo', 'JP', 35.6762, 139.6503, 'Asia'),
            ('Paris', 'FR', 48.8566, 2.3522, 'Europe'),
            ('New York', 'US', 40.7128, -74.0060, 'North America'),
            ('London', 'GB', 51.5074, -0.1278, 'Europe'),
            ('Rome', 'IT', 41.9028, 12.4964, 'Europe'),
            ('Mumbai', 'IN', 19.0760, 72.8777, 'Asia'),
            ('Singapore', 'SG', 1.3521, 103.8198, 'Asia'),
            ('Sydney', 'AU', -33.8688, 151.2093, 'Oceania'),
            ('Mexico City', 'MX', 19.4326, -99.1332, 'North America'),
            ('Bangkok', 'TH', 13.7563, 100.5018, 'Asia'),
          ]

          # Upsert countries
          for city, code, lat, lon, region in CITIES:
            try:
              country = pycountry.countries.get(alpha_2=code)
              cname = country.name
              continent = CONTINENT_MAP.get(code, region)
              flag = FLAG_EMOJI.get(code, 'đźŹłď¸Ź')

              sb.table('countries').upsert({
                'code': code,
                'name': cname,
                'continent': continent,
                'region': region,
                'flag_emoji': flag,
              }, on_conflict='code').execute()
              print(f"Country upserted: {cname}")
            except Exception as e:
              print(f"Country error {code}: {e}")

          # Get country_id mapping
          countries_result = sb.table('countries').select('id,code').execute()
          country_id_map = {r['code']: r['id'] for r in countries_result.data}
          print(f"Loaded {len(country_id_map)} country IDs")

          total_imported = 0

          # Import restaurants from OSM
          for city, code, lat, lon, region in CITIES:
            country_id = country_id_map.get(code)
            if not country_id:
              print(f"No country_id for {code}, skipping {city}")
              continue

            print(f"\nFetching OSM data for {city}...")
            query = f"""
            [out:json][timeout:60];
            (
              node["amenity"="restaurant"](around:8000,{lat},{lon});
              node["amenity"="cafe"](around:8000,{lat},{lon});
            );
            out body 300;
            """
            try:
              resp = requests.post('https://overpass-api.de/api/interpreter', data={'data': query}, timeout=90)
              resp.raise_for_status()
              data = resp.json()
            except Exception as e:
              print(f"OSM API error for {city}: {e}")
              time.sleep(10)
              continue

            elements = data.get('elements', [])
            print(f"Got {len(elements)} OSM elements for {city}")

            inserted = 0
            for el in elements:
              tags = el.get('tags', {})
              name = tags.get('name') or tags.get('name:en')
              if not name or len(name) < 2:
                continue

              cuisine_raw = tags.get('cuisine', '').lower().split(';')[0].strip()
              cuisine_type = cuisine_raw if cuisine_raw else 'international'

              try:
                sb.table('restaurants').insert({
                  'name': name[:200],
                  'city': city,
                  'country_id': country_id,
                  'cuisine_type': cuisine_type,
                  'tier': 'Remarkable',                }).execute()
                inserted += 1
                total_imported += 1
              except Exception Remarkable e:
                print(f"Insert error for {name}: {e}")
                pass

            print(f"City {city} done. Inserted {inserted} restaurants. Total: {total_imported}")
            time.sleep(5)

          print(f"\nâś… IMPORT COMPLETE! Total restaurants: {total_imported}")
          PYEOF
