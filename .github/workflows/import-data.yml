name: Import OSM Restaurant Data (ZERO-COST)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  import-osm-data:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase pycountry

      - name: Import OSM restaurant data
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests
          import os
          import time
          from supabase import create_client
          import pycountry

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          sb = create_client(url, key)

          FLAG_EMOJI = {
            'US': '🇺🇸', 'JP': '🇯🇵', 'FR': '🇫🇷', 'GB': '🇬🇧', 'IT': '🇮🇹',
            'IN': '🇮🇳', 'SG': '🇸🇬', 'AU': '🇦🇺', 'MX': '🇲🇽', 'TH': '🇹🇭',
            'TR': '🇹🇷', 'EG': '🇪🇬', 'AR': '🇦🇷', 'NG': '🇳🇬', 'KR': '🇰🇷',
          }

          CONTINENT_MAP = {
            'US': 'North America', 'JP': 'Asia', 'FR': 'Europe', 'GB': 'Europe', 'IT': 'Europe',
            'IN': 'Asia', 'SG': 'Asia', 'AU': 'Oceania', 'MX': 'North America', 'TH': 'Asia',
            'TR': 'Europe', 'EG': 'Africa', 'AR': 'South America', 'NG': 'Africa', 'KR': 'Asia',
          }

          CITIES = [
            ('Tokyo', 'JP', 35.6762, 139.6503, 'Asia'),
            ('Paris', 'FR', 48.8566, 2.3522, 'Europe'),
            ('New York', 'US', 40.7128, -74.0060, 'North America'),
            ('London', 'GB', 51.5074, -0.1278, 'Europe'),
            ('Rome', 'IT', 41.9028, 12.4964, 'Europe'),
            ('Mumbai', 'IN', 19.0760, 72.8777, 'Asia'),
            ('Singapore', 'SG', 1.3521, 103.8198, 'Asia'),
            ('Sydney', 'AU', -33.8688, 151.2093, 'Oceania'),
            ('Mexico City', 'MX', 19.4326, -99.1332, 'North America'),
            ('Bangkok', 'TH', 13.7563, 100.5018, 'Asia'),
          ]

          # Insert countries first with real pycountry data
          for city, code, lat, lon, region in CITIES:
            try:
              country = pycountry.countries.get(alpha_2=code)
              cname = country.name
              continent = CONTINENT_MAP.get(code, region)
              flag = FLAG_EMOJI.get(code, '🏳️')

              sb.table('countries').upsert({
                'code': code,
                'name': cname,
                'continent': continent,
                'region': region,
                'flag_emoji': flag,
              }, on_conflict='code').execute()
              print(f"Country upserted: {cname}")
            except Exception as e:
              print(f"Country error {code}: {e}")

          # Fetch OSM data and populate osm_restaurant_cache
          total_imported = 0

          for city, code, lat, lon, region in CITIES:
            try:
              country = pycountry.countries.get(alpha_2=code)
              cname = country.name
            except:
              cname = code

            print(f"\nFetching OSM data for {city}...")
            query = f"""
            [out:json][timeout:60];
            (
              node["amenity"="restaurant"](around:8000,{lat},{lon});
              node["amenity"="cafe"](around:8000,{lat},{lon});
            );
            out body 300;
            """
            try:
              resp = requests.post('https://overpass-api.de/api/interpreter', data={'data': query}, timeout=90)
              resp.raise_for_status()
              data = resp.json()
            except Exception as e:
              print(f"OSM API error for {city}: {e}")
              time.sleep(10)
              continue

            elements = data.get('elements', [])
            print(f"Got {len(elements)} elements from OSM for {city}")

            for el in elements:
              tags = el.get('tags', {})
              name = tags.get('name') or tags.get('name:en')
              if not name or len(name) < 2:
                continue

              osm_id = el.get('id')
              lat_r = el.get('lat')
              lon_r = el.get('lon')
              cuisine = tags.get('cuisine', '').lower().split(';')[0].strip() or 'international'

              try:
                sb.table('osm_restaurant_cache').upsert({
                  'osm_id': osm_id,
                  'name': name[:200],
                  'city': city,
                  'country': cname,
                  'lat': lat_r,
                  'lng': lon_r,
                  'cuisine': cuisine,
                  'address': tags.get('addr:full') or tags.get('addr:street', ''),
                  'phone': tags.get('phone') or tags.get('contact:phone', ''),
                  'website': tags.get('website') or tags.get('contact:website', ''),
                  'opening_hours': tags.get('opening_hours', ''),
                }, on_conflict='osm_id').execute()
                total_imported += 1
              except Exception as e:
                pass

            print(f"City {city} done. Total so far: {total_imported}")
            time.sleep(5)

          print(f"\n✅ IMPORT COMPLETE. Total OSM records: {total_imported}")
          PYEOF
