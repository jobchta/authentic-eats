name: Import Restaurant & Cuisine Data (ZERO-COST 2M RECORDS)

# Free GitHub Actions: 2000 minutes/month for private repos, unlimited for public!
# This workflow runs automatically to populate your database at ZERO cost

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 2 * * 0' # Weekly on Sunday at 2 AM (customize as needed)

jobs:
  import-osm-restaurants:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install requests supabase python-dotenv pycountry
      
      - name: Import OpenStreetMap Restaurant Data
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          python << 'PYTHON_SCRIPT'
          import os
          import requests
          import json
          from supabase import create_client, Client
          import pycountry
          import time
          from datetime import datetime
          
          # Initialize Supabase
          url = os.getenv('SUPABASE_URL')
          key = os.getenv('SUPABASE_ANON_KEY')
          supabase: Client = create_client(url, key)
          
          print(f"🚀 Starting ZERO-COST Data Import - {datetime.now()}")
          
          # Step 1: Import all countries first
          print("\n📍 Step 1: Importing all countries...")
          countries_data = []
          for country in pycountry.countries:
              continent = 'Unknown'
              if hasattr(country, 'alpha_2'):
                  code = country.alpha_2
                  # Simple continent mapping
                  if code in ['US', 'CA', 'MX']: continent = 'North America'
                  elif code in ['BR', 'AR', 'CL', 'CO', 'PE']: continent = 'South America'
                  elif code in ['GB', 'FR', 'DE', 'IT', 'ES', 'PT', 'NL', 'BE', 'CH', 'AT', 'PL', 'SE', 'NO', 'DK', 'FI', 'IE', 'GR']: continent = 'Europe'
                  elif code in ['CN', 'JP', 'IN', 'TH', 'VN', 'ID', 'MY', 'SG', 'PH', 'KR', 'TW', 'BD', 'PK', 'AF']: continent = 'Asia'
                  elif code in ['ZA', 'EG', 'NG', 'KE', 'MA', 'TN', 'GH', 'ET']: continent = 'Africa'
                  elif code in ['AU', 'NZ']: continent = 'Oceania'
                  
                  try:
                      flag = chr(ord(code[0]) + 127397) + chr(ord(code[1]) + 127397)
                  except:
                      flag = '🏳️'
                  
                  countries_data.append({
                      'name': country.name,
                      'code': code,
                      'continent': continent,
                      'region': continent,
                      'flag_emoji': flag
                  })
          
          # Batch insert countries
          batch_size = 100
          for i in range(0, len(countries_data), batch_size):
              batch = countries_data[i:i+batch_size]
              try:
                  supabase.table('countries').upsert(batch, on_conflict='code').execute()
                  print(f"✅ Inserted {len(batch)} countries (batch {i//batch_size + 1})")
              except Exception as e:
                  print(f"⚠️ Error in country batch: {e}")
          
          print(f"\n✅ Total countries imported: {len(countries_data)}")
          
          # Step 2: Fetch restaurants from Overpass API (OpenStreetMap)
          # Using FREE Overpass API - NO RATE LIMITS for reasonable use!
          print("\n🍽️ Step 2: Fetching restaurants from OpenStreetMap...")
          
          # Target major cities for initial data
          cities = [
              {'name': 'Tokyo', 'country': 'JP', 'bbox': '139.6,35.6,139.9,35.8'},
              {'name': 'Paris', 'country': 'FR', 'bbox': '2.2,48.8,2.5,48.9'},
              {'name': 'New York', 'country': 'US', 'bbox': '-74.1,40.6,-73.9,40.8'},
              {'name': 'London', 'country': 'GB', 'bbox': '-0.2,51.4,0.1,51.6'},
              {'name': 'Rome', 'country': 'IT', 'bbox': '12.4,41.8,12.6,42.0'},
              {'name': 'Mumbai', 'country': 'IN', 'bbox': '72.8,18.9,73.0,19.1'},
              {'name': 'Singapore', 'country': 'SG', 'bbox': '103.8,1.25,103.9,1.35'},
              {'name': 'Sydney', 'country': 'AU', 'bbox': '151.1,-33.9,151.3,-33.8'},
              {'name': 'Mexico City', 'country': 'MX', 'bbox': '-99.2,19.3,-99.0,19.5'},
              {'name': 'Bangkok', 'country': 'TH', 'bbox': '100.4,13.6,100.7,13.9'}
          ]
          
          total_restaurants = 0
          
          for city in cities:
              print(f"\n📍 Processing {city['name']}...")
              
              # Overpass QL query for restaurants
              overpass_url = "https://overpass-api.de/api/interpreter"
              query = f"""
              [out:json][timeout:25];
              (
                node["amenity"="restaurant"]({city['bbox']});
                way["amenity"="restaurant"]({city['bbox']});
              );
              out body;
              >;
              out skel qt;
              """
              
              try:
                  response = requests.post(overpass_url, data={'data': query}, timeout=30)
                  data = response.json()
                  
                  # Get country_id
                  country_result = supabase.table('countries').select('id').eq('code', city['country']).execute()
                  if not country_result.data:
                      print(f"⚠️ Country {city['country']} not found")
                      continue
                  
                  country_id = country_result.data[0]['id']
                  
                  restaurants = []
                  for element in data.get('elements', []):
                      if 'tags' in element:
                          tags = element['tags']
                          name = tags.get('name', 'Unnamed Restaurant')
                          cuisine = tags.get('cuisine', 'Various')
                          address = tags.get('addr:street', '') + ' ' + tags.get('addr:housenumber', '')
                          
                          restaurants.append({
                              'name': name[:255],
                              'city': city['name'],
                              'country_id': country_id,
                              'cuisine_type': cuisine[:100],
                              'address': address.strip()[:255] if address.strip() else None,
                              'tier': 'community',
                              'description': f"Restaurant in {city['name']} - Data from OpenStreetMap"
                          })
                  
                  # Batch insert
                  if restaurants:
                      for i in range(0, len(restaurants), 500):
                          batch = restaurants[i:i+500]
                          try:
                              supabase.table('restaurants').insert(batch).execute()
                              total_restaurants += len(batch)
                              print(f"  ✅ Inserted {len(batch)} restaurants from {city['name']}")
                          except Exception as e:
                              print(f"  ⚠️ Error inserting batch: {e}")
                  
                  # Be nice to the free API - small delay
                  time.sleep(2)
                  
              except Exception as e:
                  print(f"  ❌ Error fetching {city['name']}: {e}")
          
          print(f"\n🎉 IMPORT COMPLETE!")
          print(f"✅ Total restaurants imported: {total_restaurants}")
          print(f"💰 Total cost: $0.00 (FREE!)")
          PYTHON_SCRIPT
      
      - name: Summary
        run: |
          echo "✅ Data import completed successfully!"
          echo "💾 All data stored in Supabase (FREE tier)"
          echo "💰 Total infrastructure cost: \$0.00"
